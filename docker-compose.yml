services:
  db:
    image: postgres:15
    container_name: nexus_db
    restart: always
    env_file:
      - .env.db.docker
    ports:
      - "${DB_PORT_HOST}:${DB_PORT_CONTAINER}"
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_PATH_HOST}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: ../Dockerfile.backend
    container_name: nexus_backend
    restart: always
    env_file:
      - .env.backend.docker
    ports:
      - "${BACKEND_PORT_HOST}:${BACKEND_PORT_CONTAINER}"
    volumes:
      - type: bind
        source: ${BACKEND_STORAGE_PATH_HOST}
        target: /app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${PORT}/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: nexus_frontend
    restart: always
    env_file:
      - .env.frontend.docker
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    ports:
      - "${FRONTEND_PORT_HOST}:${FRONTEND_PORT_CONTAINER}"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: nexus_network
    driver: bridge

volumes:
  frontend_node_modules:
